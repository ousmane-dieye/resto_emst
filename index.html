<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartResto ESMT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0F0E;
  --bg2: #111714;
  --bg3: #1A201D;
  --card: #161C19;
  --border: #2A3530;
  --green: #2ECC7A;
  --green2: #1A9954;
  --green-dim: #1A3029;
  --orange: #F4903B;
  --orange-dim: #2D1E0F;
  --red: #E85454;
  --red-dim: #2D1010;
  --blue: #4A9EFF;
  --blue-dim: #0F1E30;
  --gold: #F5C842;
  --gold-dim: #2B2308;
  --text: #E8EDE9;
  --text2: #8FA898;
  --text3: #5A7065;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
h1,h2,h3,h4{font-family:'Syne',sans-serif;}

/* LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s;}
.sidebar.hidden{transform:translateX(-100%);}
.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column;transition:margin .3s;}
.main.full{margin-left:0;}
.content{flex:1;padding:28px 32px;max-width:1400px;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}

/* SIDEBAR */
.logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;color:var(--text2);transition:all .2s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--green-dim);color:var(--green);font-weight:500;}
.nav-item .icon{width:20px;text-align:center;font-size:16px;}
.nav-section{font-size:11px;color:var(--text3);padding:12px 12px 6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--green-dim);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* STAT CARDS */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.green::before{background:var(--green);}
.stat-card.orange::before{background:var(--orange);}
.stat-card.blue::before{background:var(--blue);}
.stat-card.gold::before{background:var(--gold);}
.stat-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin:8px 0 4px;}
.stat-label{font-size:13px;color:var(--text2);}
.stat-icon{position:absolute;right:16px;top:16px;font-size:28px;opacity:.3;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .2s;}
.btn-primary{background:var(--green);color:#000;}
.btn-primary:hover{background:#36e085;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--green);color:var(--green);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid transparent;}
.btn-danger:hover{border-color:var(--red);}
.btn-sm{padding:6px 12px;font-size:13px;}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;background:var(--bg3);border:1px solid var(--border);color:var(--text2);}

/* INPUTS */
.input-group{margin-bottom:14px;}
.label{font-size:13px;color:var(--text2);margin-bottom:6px;display:block;}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.input:focus{border-color:var(--green);}
.select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.select option{background:var(--bg3);}
textarea.input{resize:vertical;min-height:80px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-gold{background:var(--gold-dim);color:var(--gold);}

/* TABLE */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 14px;font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid var(--border);color:var(--text2);}
td:first-child{color:var(--text);}
tr:hover td{background:rgba(255,255,255,.02);}
tr:last-child td{border-bottom:none;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

/* PLAT CARDS */
.plat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.plat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s;position:relative;}
.plat-card:hover{border-color:var(--green);transform:translateY(-2px);}
.plat-card.eco{border-color:var(--orange);}
.plat-emoji{height:120px;display:flex;align-items:center;justify-content:center;font-size:52px;background:var(--bg3);}
.plat-body{padding:14px;}
.plat-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:4px;}
.plat-desc{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.plat-footer{display:flex;align-items:center;justify-content:space-between;}
.plat-price{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--green);}
.stars{color:var(--gold);font-size:12px;}
.allergene-tag{display:inline-block;background:var(--red-dim);color:var(--red);border-radius:4px;padding:2px 7px;font-size:11px;margin:2px;}
.allergen-warn{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:12px;}

/* COMMANDE ITEM */
.commande-item{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:8px;gap:12px;}
.commande-qr{width:60px;height:60px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.commande-qr img{width:100%;height:100%;}

/* QR FULL */
.qr-display{text-align:center;padding:20px 0;}
.qr-display img{width:200px;height:200px;border-radius:12px;}

/* NOTIFICATIONS */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:var(--radius-sm);background:var(--bg3);border-left:3px solid var(--green);margin-bottom:8px;}
.notif-item.lue{opacity:.5;border-left-color:var(--border);}

/* STOCK */
.stock-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px;}
.stock-fill{height:100%;border-radius:3px;transition:width .5s;}

/* LOADER */
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* AUTH */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:relative;overflow:hidden;}
.auth-page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(46,204,122,.06) 0%,transparent 70%);top:-100px;right:-100px;pointer-events:none;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:440px;}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo-icon{width:60px;height:60px;background:var(--green);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;}
.auth-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;}
.auth-sub{font-size:14px;color:var(--text2);margin-top:4px;}
.tabs{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:24px;}
.tab{flex:1;text-align:center;padding:8px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2);}

/* POINTS */
.points-ring{width:100px;height:100px;border-radius:50%;border:4px solid var(--green);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;}
.points-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--green);}

/* KITCHEN */
.bon-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--orange);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.bon-card.urgent{border-left-color:var(--red);}
.bon-card.pret{border-left-color:var(--green);}

/* PREDICTION */
.pred-bar{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.pred-bar-label{width:80px;font-size:13px;color:var(--text2);}
.pred-bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.pred-bar-fill{height:100%;background:var(--green);border-radius:4px;}
.pred-bar-val{width:40px;text-align:right;font-size:13px;font-weight:600;}

/* CHECKBOX ALLERGENES */
.allerg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.allerg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:all .2s;}
.allerg-item.selected{background:var(--red-dim);border-color:var(--red);color:var(--red);}

/* TOAST */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}
.toast.info{border-left:3px solid var(--blue);}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .grid4,.grid3{grid-template-columns:1fr 1fr;}
  .content{padding:16px;}
}
.empty{text-align:center;padding:40px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:8px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.flex{display:flex;align-items:center;gap:8px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;}.mb-16{margin-bottom:16px;}
.text-sm{font-size:13px;}.text-xs{font-size:12px;}.text-green{color:var(--green);}.text-orange{color:var(--orange);}.text-red{color:var(--red);}.text-dim{color:var(--text2);}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-container" id="toasts"></div>

<script>
// ─── API ──────────────────────────────────────────────────────────
const API = 'http://localhost:3001/api';
let token = localStorage.getItem('sr_token');
let currentUser = JSON.parse(localStorage.getItem('sr_user') || 'null');

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(API + path, { headers, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Erreur');
  return data;
}

// ─── TOAST ────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── STATE ────────────────────────────────────────────────────────
let state = {
  page: currentUser ? getHomePage() : 'login',
  plats: [], commandes: [], creneaux: [], stocks: [],
  fournisseurs: [], notifications: [], utilisateurs: [],
  stats: null, prediction: null,
  modal: null, modalData: null,
  selectedPlat: null, selectedCreneau: null,
  filterCategorie: 'tous', loading: false
};

function getHomePage() {
  if (!currentUser) return 'login';
  const pages = { ETUDIANT: 'menu', CUISINIER: 'cuisine', ADMINISTRATEUR: 'dashboard', GESTIONNAIRE: 'stocks', SUPER_ADMIN: 'dashboard' };
  return pages[currentUser.role] || 'menu';
}

// ─── RENDER ───────────────────────────────────────────────────────
async function navigate(page) {
  state.page = page;
  await render();
}

async function render() {
  const root = document.getElementById('root');
  if (!currentUser || state.page === 'login' || state.page === 'register') {
    root.innerHTML = renderAuth();
    bindAuth();
    return;
  }
  root.innerHTML = `
    <div class="app">
      ${renderSidebar()}
      <div class="main">
        ${renderTopbar()}
        <div class="content">
          ${await renderPage()}
        </div>
      </div>
    </div>`;
  bindAll();
}

// ─── AUTH PAGE ────────────────────────────────────────────────────
function renderAuth() {
  const isLogin = state.page !== 'register';
  const allergenes = ['Arachides', 'Lactose', 'Gluten', 'Fruits de mer', 'Œufs', 'Soja'];
  return `
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🍽</div>
        <div class="auth-title">SmartResto ESMT</div>
        <div class="auth-sub">Votre cantine intelligente</div>
      </div>
      <div class="tabs">
        <div class="tab ${isLogin?'active':''}" onclick="navigate('login')">Connexion</div>
        <div class="tab ${!isLogin?'active':''}" onclick="navigate('register')">Inscription</div>
      </div>
      ${isLogin ? `
      <form id="login-form">
        <div class="input-group"><label class="label">Email institutionnel</label><input class="input" type="email" id="email" placeholder="prenom.nom@esmt.sn" required></div>
        <div class="input-group"><label class="label">Mot de passe</label><input class="input" type="password" id="password" placeholder="••••••••" required></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" type="submit" id="login-btn">
          <span>Se connecter</span>
        </button>
        <p class="text-sm text-dim" style="margin-top:12px;text-align:center">
          Comptes démo: admin@esmt.sn / admin123 • cuisinier@esmt.sn / cuisine123
        </p>
      </form>` : `
      <form id="register-form">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="input-group"><label class="label">Nom</label><input class="input" id="r-nom" placeholder="Diallo" required></div>
          <div class="input-group"><label class="label">Prénom</label><input class="input" id="r-prenom" placeholder="Fatou" required></div>
        </div>
        <div class="input-group"><label class="label">Email ESMT</label><input class="input" type="email" id="r-email" placeholder="fatou.diallo@esmt.sn" required></div>
        <div class="input-group"><label class="label">Mot de passe</label><input class="input" type="password" id="r-password" placeholder="••••••••" required></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="input-group"><label class="label">Numéro étudiant</label><input class="input" id="r-num" placeholder="ESMT-2024-XXX"></div>
          <div class="input-group"><label class="label">Classe</label><input class="input" id="r-classe" placeholder="MBA1"></div>
        </div>
        <div class="input-group"><label class="label">Filière</label><input class="input" id="r-filiere" placeholder="Marketing Digital"></div>
        <div class="input-group">
          <label class="label">⚠️ Mes allergènes</label>
          <div class="allerg-grid">
            ${allergenes.map(a => `<div class="allerg-item" data-allerg="${a}" onclick="toggleAllerg(this)">${a}</div>`).join('')}
          </div>
        </div>
        <div class="input-group"><label class="label">Autres restrictions alimentaires</label><textarea class="input" id="r-autres" placeholder="Végétarien, halal..."></textarea></div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px" type="submit">Créer mon compte</button>
      </form>`}
    </div>
  </div>`;
}

function toggleAllerg(el) { el.classList.toggle('selected'); }

function bindAuth() {
  const lf = document.getElementById('login-form');
  const rf = document.getElementById('register-form');
  if (lf) lf.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="loader"></span>';
    try {
      const data = await api('/auth/connexion', { method: 'POST', body: { email: document.getElementById('email').value, motDePasse: document.getElementById('password').value }});
      token = data.token; currentUser = data.utilisateur;
      localStorage.setItem('sr_token', token);
      localStorage.setItem('sr_user', JSON.stringify(currentUser));
      state.page = getHomePage();
      toast(`Bienvenue, ${currentUser.prenom} !`);
      await render();
    } catch(err) { toast(err.message, 'error'); btn.innerHTML = '<span>Se connecter</span>'; }
  });
  if (rf) rf.addEventListener('submit', async e => {
    e.preventDefault();
    const allergenes = [...document.querySelectorAll('.allerg-item.selected')].map(el => el.dataset.allerg);
    try {
      await api('/auth/inscription', { method: 'POST', body: {
        nom: document.getElementById('r-nom').value,
        prenom: document.getElementById('r-prenom').value,
        email: document.getElementById('r-email').value,
        motDePasse: document.getElementById('r-password').value,
        numeroEtudiant: document.getElementById('r-num').value,
        classe: document.getElementById('r-classe').value,
        filiere: document.getElementById('r-filiere').value,
        allergenes, autresRestrictions: document.getElementById('r-autres').value
      }});
      toast('Compte créé ! Vous pouvez vous connecter.');
      navigate('login');
    } catch(err) { toast(err.message, 'error'); }
  });
}

// ─── SIDEBAR ──────────────────────────────────────────────────────
function renderSidebar() {
  const role = currentUser?.role;
  const navItems = {
    ETUDIANT: [
      { id: 'menu', icon: '🍽', label: 'Menu du jour' },
      { id: 'commandes', icon: '📋', label: 'Mes commandes' },
      { id: 'points', icon: '⭐', label: 'Mes points ESMT' },
      { id: 'notifications', icon: '🔔', label: 'Notifications' },
    ],
    CUISINIER: [

// ─── PAGES ────────────────────────────────────────────────────────
async function renderPage() {
  try {
    switch(state.page) {
      case 'menu': return await renderMenu();
      case 'commandes': return await renderCommandes();
      case 'points': return renderPoints();
      case 'notifications': return await renderNotifications();
      case 'dashboard': return await renderDashboard();
      case 'cuisine': return await renderCuisine();
      case 'stocks': return await renderStocks();
      case 'fournisseurs': return await renderFournisseurs();
      case 'utilisateurs': return await renderUtilisateurs();
      case 'prediction': return await renderPrediction();
      default: return '<div class="empty"><div class="empty-icon">🚧</div><p>Page en construction</p></div>';

    return `<div class="empty"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function renderMenu() {

      return `
      <div class="plat-card ${p.estRepasEco?'eco':''}" onclick="${currentUser?.role==='ETUDIANT'?`openModal('commander','${p.id}')`:`openModal('edit-plat','${p.id}')`}">

            <span class="stars">${'★'.repeat(Math.round(p.noteMoyenne))}${'☆'.repeat(5-Math.round(p.noteMoyenne))} ${p.noteMoyenne.toFixed(1)}</span>

async function renderCuisine() {
  const bons = await api('/commandes/bons-preparation');
  const urgents = bons.filter(b => new Date(b.dateHeure) < new Date(Date.now() - 15*60000));
  return `
  <div class="flex-between mb-16">
    <div class="flex">
      <span class="badge badge-orange">${bons.length} bons en attente</span>
      ${urgents.length > 0 ? `<span class="badge badge-red">⚠️ ${urgents.length} urgents</span>` : ''}
    </div>
    <button class="btn btn-secondary btn-sm" onclick="navigate('cuisine')">↻ Rafraîchir</button>
  </div>
  ${bons.length === 0 ? `<div class="empty"><div class="empty-icon">✅</div><p>Aucun bon en attente — Cuisine à jour !</p></div>` :
  bons.map(b => {
    const age = Math.round((Date.now() - new Date(b.dateHeure).getTime()) / 60000);
    const isUrgent = age > 15;
    return `
    <div class="bon-card ${isUrgent?'urgent':''}">
      <div class="flex-between mb-8">
        <div class="flex">
          <span style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">${b.plat?.nom || 'Plat'}</span>
          ${isUrgent ? '<span class="badge badge-red">Urgent</span>' : ''}
        </div>
        <span class="text-dim text-sm">${age} min</span>
      </div>
      <div class="text-sm text-dim">Commande N° ${b.id.slice(-8).toUpperCase()}</div>
      <div class="flex mt-12" style="gap:8px">
        <button class="btn btn-primary btn-sm" onclick="validerCommande('${b.id}')">✓ Prêt</button>
        <span class="badge ${isUrgent?'badge-red':'badge-orange'}">${b.statut}</span>
      </div>
    </div>`;
  }).join('')}`;
}

          <td class="text-dim">${new Date(u.dateCreation).toLocaleDateString('fr-FR')}</td>
          <td>${u.actif ? '<span class="badge badge-green">Actif</span>' : '<span class="badge badge-red">Inactif</span>'}</td>
          <td>${currentUser?.role === 'SUPER_ADMIN' && u.id !== currentUser.id ? `<button class="btn ${u.actif?'btn-danger':'btn-secondary'} btn-sm" onclick="toggleUser('${u.id}')">${u.actif?'Désactiver':'Activer'}</button>` : ''}</td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  ${renderModal()}`;
}

async function toggleUser(id) {
  await api(`/utilisateurs/${id}/toggle`, { method: 'PUT' });
  toast('Statut modifié');
  navigate('utilisateurs');
}

// ─── PREDICTION ───────────────────────────────────────────────────
async function renderPrediction() {
  const pred = await api('/prediction');
  state.stocks = await api('/stocks');
  const total = Object.values(pred.previsionParCreneau).reduce((a,b)=>a+b,0);
  return `
  <div class="grid2 mb-16">
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:14px;color:var(--text3);margin-bottom:8px">🤖 PRÉDICTION IA — ${new Date().toLocaleDateString('fr-FR')}</div>
      <div style="font-family:'Syne',sans-serif;font-size:52px;font-weight:800;color:var(--green)">${pred.nbCouvertsPrevu}</div>
      <div class="text-dim">couverts prévus</div>
      <div class="badge badge-green mt-16">${Math.round(pred.tauxConfiance*100)}% de fiabilité</div>
      ${pred.surplusDetecte ? '<div class="badge badge-orange mt-8">♻️ Surplus détecté</div>' : ''}
    </div>
    <div class="card">
      <div class="card-title mb-16">Répartition par créneau</div>
      ${Object.entries(pred.previsionParCreneau).map(([h,v]) => {
        const pct = v/total*100;
        return `
        <div class="mb-16">
          <div class="flex-between mb-8">
            <span class="text-sm">${h}</span>
            <span style="font-weight:600">${v} couverts</span>
          </div>
          <div class="stock-bar" style="height:10px">
            <div class="stock-fill" style="width:${pct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title mb-16">📦 État des stocks & recommandations</div>
    <div class="grid3">
      ${state.stocks.map(s => {
        const pct = Math.min(100, s.quantite / (s.seuilAlerte * 4) * 100);
        const color = s.estCritique ? 'var(--red)' : pct < 50 ? 'var(--orange)' : 'var(--green)';
        return `
        <div style="padding:14px;background:var(--bg3);border-radius:var(--radius-sm)">
          <div class="flex-between mb-8">
            <span style="font-weight:600">${s.ingredient}</span>
            ${s.estCritique ? '<span class="badge badge-red">Critique</span>' : '<span class="badge badge-green">OK</span>'}
          </div>
          <div class="text-sm text-dim mb-8">${s.quantite} / ${s.seuilAlerte * 4} ${s.unite}</div>
          <div class="stock-bar"><div class="stock-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ─── MODALS ───────────────────────────────────────────────────────
function openModal(type, id = null) {
  state.modal = type; state.modalData = id;
  render();
}
function closeModal() { state.modal = null; state.modalData = null; render(); }

function renderModal() {
  if (!state.modal) return '';
  const handlers = { 'commander': renderCommanderModal, 'edit-plat': renderEditPlatModal, 'add-plat': renderAddPlatModal, 'qr': renderQRModal, 'feedback': renderFeedbackModal, 'add-staff': renderAddStaffModal, 'add-fourn': renderAddFournModal, 'stock': renderStockModal };
  const content = handlers[state.modal] ? handlers[state.modal]() : '';
  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()">${content}</div>`;
}

function renderCommanderModal() {
  const plat = state.plats.find(p => p.id === state.modalData);
  if (!plat) return '';
  const emojiMap = { 'Thiéboudienne':'🐟', 'Yassa Poulet':'🍗', 'Mafé':'🥜', 'Salade Composée':'🥗', 'Jus de Bissap':'🍹', 'Repas Eco':'♻️' };
  return `<div class="modal">
    <div class="modal-header"><h3>${emojiMap[plat.nom]||'🍽'} Commander</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="text-align:center;margin-bottom:20px;padding:20px;background:var(--bg3);border-radius:var(--radius-sm)">
        <div style="font-size:40px;margin-bottom:8px">${emojiMap[plat.nom]||'🍽'}</div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700">${plat.nom}</div>
        <div class="text-dim text-sm mt-8">${plat.description}</div>
        <div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--green);margin-top:12px">${plat.prixFCFA.toLocaleString()} FCFA</div>
      </div>
      <div class="input-group"><label class="label">Créneau de retrait</label>
        <select class="select" id="creneau-sel">
          <option value="">-- Choisir un créneau --</option>
          ${state.creneaux.map(c => `<option value="${c.id}">${c.heureDebut} - ${c.heureFin} ${c.estCreneauCalme?'(+'+c.bonusPoints+' pts bonus)':''} — ${c.nbReservations}/${c.capaciteMax} places</option>`).join('')}
        </select>
      </div>
      <div class="input-group"><label class="label">Méthode de paiement</label>
        <select class="select" id="paiement-sel">
          <option value="WAVE">💙 Wave</option>
          <option value="ORANGE_MONEY">🟠 Orange Money</option>
          <option value="CARTE">💳 Carte bancaire</option>
          <option value="ESPECES">💵 Espèces</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="passerCommande('${plat.id}')">✓ Confirmer la commande</button>
    </div>
  </div>`;
}

async function passerCommande(platId) {
  const creneauId = document.getElementById('creneau-sel').value;
  const methodePaiement = document.getElementById('paiement-sel').value;
  if (!creneauId) { toast('Choisissez un créneau', 'error'); return; }
  try {
    const data = await api('/commandes', { method: 'POST', body: { platId, creneauId, methodePaiement }});
    currentUser.pointsESMT = (currentUser.pointsESMT || 0) + data.commande.pointsGagnes;
    localStorage.setItem('sr_user', JSON.stringify(currentUser));
    toast(`Commande confirmée ! +${data.commande.pointsGagnes} points ⭐`);
    closeModal();
    navigate('commandes');
  } catch(err) {
    toast(err.message, 'error');
  }
}

function renderQRModal() {
  const commande = state.commandes.find(c => c.id === state.modalData);
  if (!commande) return '';
  return `<div class="modal">
    <div class="modal-header"><h3>QR Code de validation</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="qr-display">
        <img src="${commande.qrCode}" alt="QR Code">
        <p class="text-dim text-sm mt-16">Présentez ce QR code à la borne de validation</p>
        <p class="text-dim text-sm">Expire le ${new Date(commande.qrExpireA).toLocaleString('fr-FR')}</p>
      </div>
    </div>
  </div>`;
}

function renderFeedbackModal() {
  return `<div class="modal">
    <div class="modal-header"><h3>📝 Évaluer votre repas</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="input-group"><label class="label">Goût</label><select class="select" id="fb-gout"><option value="5">⭐⭐⭐⭐⭐ Excellent</option><option value="4">⭐⭐⭐⭐ Très bon</option><option value="3">⭐⭐⭐ Bien</option><option value="2">⭐⭐ Moyen</option><option value="1">⭐ Mauvais</option></select></div>
      <div class="input-group"><label class="label">Température</label><select class="select" id="fb-temp"><option value="5">⭐⭐⭐⭐⭐ Parfaite</option><option value="4">⭐⭐⭐⭐ Bonne</option><option value="3">⭐⭐⭐ Correcte</option><option value="2">⭐⭐ Froide</option><option value="1">⭐ Très froide</option></select></div>
      <div class="input-group"><label class="label">Portion</label><select class="select" id="fb-portion"><option value="5">⭐⭐⭐⭐⭐ Généreuse</option><option value="4">⭐⭐⭐⭐ Suffisante</option><option value="3">⭐⭐⭐ Correcte</option><option value="2">⭐⭐ Insuffisante</option><option value="1">⭐ Très petite</option></select></div>
      <div class="input-group"><label class="label">Commentaire</label><textarea class="input" id="fb-comment" placeholder="Votre avis..."></textarea></div>
      <div style="background:var(--green-dim);border-radius:var(--radius-sm);padding:10px;text-align:center;font-size:13px;color:var(--green)">+5 points ESMT pour votre feedback !</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="soumettreFeedback('${state.modalData}')">Envoyer</button>
    </div>
  </div>`;
}

async function soumettreFeedback(commandeId) {
  try {
    await api('/feedbacks', { method: 'POST', body: {
      commandeId,
      noteGout: parseInt(document.getElementById('fb-gout').value),
      noteTemperature: parseInt(document.getElementById('fb-temp').value),
      notePortion: parseInt(document.getElementById('fb-portion').value),
      commentaire: document.getElementById('fb-comment').value
    }});
    currentUser.pointsESMT += 5;
    localStorage.setItem('sr_user', JSON.stringify(currentUser));
    toast('Merci pour votre feedback ! +5 pts');
    closeModal();
  } catch(err) { toast(err.message, 'error'); }
}

function renderAddPlatModal() {
  return `<div class="modal">
    <div class="modal-header"><h3>+ Nouveau plat</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="input-group"><label class="label">Nom du plat</label><input class="input" id="np-nom" placeholder="Thiéboudienne"></div>
      <div class="input-group"><label class="label">Description</label><input class="input" id="np-desc" placeholder="Riz au poisson sénégalais"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="input-group"><label class="label">Prix (FCFA)</label><input class="input" type="number" id="np-prix" placeholder="1500"></div>
        <div class="input-group"><label class="label">Catégorie</label>
          <select class="select" id="np-cat">
            <option value="plat_principal">Plat principal</option>
            <option value="entree">Entrée</option>
            <option value="boisson">Boisson</option>
            <option value="dessert">Dessert</option>
          </select>
        </div>
      </div>
      <div class="input-group"><label class="label">Allergènes (séparés par virgule)</label><input class="input" id="np-allerg" placeholder="arachides, gluten"></div>
      <div class="input-group" style="display:flex;align-items:center;gap:10px"><input type="checkbox" id="np-eco"><label class="label" style="margin:0">Plat anti-gaspillage (éco)</label></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="ajouterPlat()">Ajouter</button>
    </div>
  </div>`;
}

async function ajouterPlat() {
  try {
    await api('/plats', { method: 'POST', body: {
      nom: document.getElementById('np-nom').value,
      description: document.getElementById('np-desc').value,
      prixFCFA: parseInt(document.getElementById('np-prix').value),
      categorie: document.getElementById('np-cat').value,
      allergenes: document.getElementById('np-allerg').value.split(',').map(s=>s.trim()).filter(Boolean),
      estRepasEco: document.getElementById('np-eco').checked,
      estDisponible: true
    }});
    toast('Plat ajouté !');
    closeModal();
    navigate('menu');
  } catch(err) { toast(err.message, 'error'); }
}

function renderEditPlatModal() {
  const p = state.plats.find(pl => pl.id === state.modalData);
  if (!p) return '';
  return `<div class="modal">
    <div class="modal-header"><h3>✏️ Modifier ${p.nom}</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="input-group"><label class="label">Disponible</label>
        <select class="select" id="ep-dispo">
          <option value="true" ${p.estDisponible?'selected':''}>Disponible</option>
          <option value="false" ${!p.estDisponible?'selected':''}>Indisponible</option>
        </select>
      </div>
      <div class="input-group"><label class="label">Prix (FCFA)</label><input class="input" type="number" id="ep-prix" value="${p.prixFCFA}"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="supprimerPlat('${p.id}')">🗑 Supprimer</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="modifierPlat('${p.id}')">Sauvegarder</button>
    </div>
  </div>`;
}

async function modifierPlat(id) {
  await api(`/plats/${id}`, { method: 'PUT', body: { estDisponible: document.getElementById('ep-dispo').value === 'true', prixFCFA: parseInt(document.getElementById('ep-prix').value) }});
  toast('Plat mis à jour !');
  closeModal();
  navigate('menu');
}

async function supprimerPlat(id) {
  if (!confirm('Supprimer ce plat ?')) return;
  await api(`/plats/${id}`, { method: 'DELETE' });
  toast('Plat supprimé');
  closeModal();
  navigate('menu');
}

function renderAddStaffModal() {
  return `<div class="modal">
    <div class="modal-header"><h3>+ Ajouter un membre du staff</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="input-group"><label class="label">Nom</label><input class="input" id="st-nom"></div>
        <div class="input-group"><label class="label">Prénom</label><input class="input" id="st-prenom"></div>

        <div class="input-group"><label class="label">Rôle</label>
          <select class="select" id="st-role">
            <option value="CUISINIER">Cuisinier</option>
            <option value="GESTIONNAIRE">Gestionnaire</option>
            <option value="ADMINISTRATEUR">Administrateur</option>
          </select>
        </div>
        <div class="input-group"><label class="label">Poste</label><input class="input" id="st-poste" placeholder="Chef cuisine"></div>

      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>

  </div>`;
}

async function ajouterStaff() {
  try {
    const data = await api('/utilisateurs/staff', { method: 'POST', body: { nom: document.getElementById('st-nom').value, prenom: document.getElementById('st-prenom').value, email: document.getElementById('st-email').value, role: document.getElementById('st-role').value, poste: document.getElementById('st-poste').value }});
    toast(`Compte créé ! MDP temporaire: ${data.motDePasseTemp}`);
    closeModal();
    navigate('utilisateurs');
  } catch(err) { toast(err.message, 'error'); }
}

function renderAddFournModal() {
  return `<div class="modal">
    <div class="modal-header"><h3>+ Nouveau fournisseur</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="input-group"><label class="label">Nom</label><input class="input" id="f-nom" placeholder="Marché Central"></div>
      <div class="input-group"><label class="label">Contact</label><input class="input" id="f-contact" placeholder="+221 77 ..."></div>
      <div class="input-group"><label class="label">Délai de livraison (jours)</label><input class="input" type="number" id="f-delai" value="1"></div>

      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="ajouterFournisseur()">Ajouter</button>

}

async function ajouterFournisseur() {
  try {

    toast('Fournisseur ajouté !');
    closeModal();
    navigate('fournisseurs');
  } catch(err) { toast(err.message, 'error'); }
}

function renderStockModal() {
  const s = state.stocks.find(st => st.id === state.modalData);
  if (!s) return '';
  return `<div class="modal">
    <div class="modal-header"><h3>📦 Modifier ${s.ingredient}</h3><button class="btn btn-icon" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="input-group"><label class="label">Quantité actuelle (${s.unite})</label><input class="input" type="number" id="sk-qty" value="${s.quantite}" step="0.1"></div>
      <div class="input-group"><label class="label">Seuil d'alerte (${s.unite})</label><input class="input" type="number" id="sk-seuil" value="${s.seuilAlerte}" step="0.1"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="mettreAJourStock('${s.id}')">Sauvegarder</button>
    </div>
  </div>`;
}

async function mettreAJourStock(id) {
  await api(`/stocks/${id}`, { method: 'PUT', body: { quantite: parseFloat(document.getElementById('sk-qty').value), seuilAlerte: parseFloat(document.getElementById('sk-seuil').value) }});
  toast('Stock mis à jour !');
  closeModal();
  navigate('stocks');
}
